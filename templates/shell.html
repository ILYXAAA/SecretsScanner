<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shell - Secrets Scanner</title>
    <link rel="stylesheet" href="/secret_scanner/static/css/shell.css">
    <link rel="icon" type="image/x-icon" href="/secret_scanner/favicon.ico">
</head>
<body
    data-authenticated="{{ 'true' if authenticated else 'false' }}"
    data-exec-url="{{ exec_url }}"
    data-unlock-url="{{ get_full_url('shell/unlock') }}"
    data-lock-url="{{ get_full_url('shell/lock') }}"
>
    <div class="container">
        <div class="header">
            <h1>🖥️ Shell</h1>
            <nav class="nav-links">
                <a href="/secret_scanner/dashboard">📌 Главная</a>
                {% if authenticated %}
                <button class="btn-lock" id="lockBtn">🔒 Заблокировать</button>
                {% endif %}
            </nav>
        </div>

        {% if not authenticated %}
        <div class="auth-panel" id="authPanel">
            <form id="unlockForm">
                <h2>Доступ к shell</h2>
                <p class="auth-hint">Введите пароль для выполнения команд на сервере</p>
                <input type="password" id="passwordInput" placeholder="Пароль" autocomplete="off" required>
                <button type="submit" id="unlockBtn">Войти</button>
                <p class="auth-error" id="authError" hidden></p>
            </form>
        </div>
        {% else %}
        <div class="shell-panel">
            <div class="shell-output" id="shellOutput"></div>
            <form class="shell-input-row" id="commandForm">
                <span class="shell-prompt" id="shellPrompt">$</span>
                <input type="text" id="commandInput" placeholder="ls -la" autocomplete="off" spellcheck="false" autofocus>
                <button type="submit" id="runBtn">Run</button>
            </form>
            <div class="shell-status" id="shellStatus">Готов</div>
        </div>
        {% endif %}
    </div>

    <script src="/secret_scanner/static/js/shell.js?v=4"></script>
</body>
</html>
